<svg width="192" height="192" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo degradado -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fondo con esquinas redondeadas -->
  <rect width="192" height="192" rx="42" fill="url(#grad1)"/>
  
  <!-- Círculo central -->
  <circle cx="96" cy="96" r="60" fill="#ffffff" opacity="0.95"/>
  
  <!-- Letra P -->
  <text x="96" y="125" font-family="Arial, sans-serif" font-size="70" font-weight="bold" fill="#667eea" text-anchor="middle">P</text>
  
  <!-- Subtítulo pequeño -->
  <text x="96" y="150" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle" opacity="0.9">PWA</text>
</svg>
